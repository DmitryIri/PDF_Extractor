<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PDF Extractor{% endblock %}</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.10"
          integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5ViYgSibmK"
          crossorigin="anonymous"></script>

  <!-- IBM Plex Sans + IBM Plex Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet" />

  <style>
    body       { font-family: 'IBM Plex Sans', system-ui, sans-serif; }
    .mono      { font-family: 'IBM Plex Mono', monospace; }
    /* Smooth HTMX transitions */
    .htmx-swapping { opacity: 0; transition: opacity 0.15s ease-out; }
  </style>
</head>

<body class="min-h-screen bg-stone-50 text-stone-900 antialiased">

  <!-- Header -->
  <header class="sticky top-0 z-10 border-b border-stone-200 bg-white/90 backdrop-blur-sm">
    <div class="max-w-2xl mx-auto px-6 py-4 flex items-center gap-3">
      <a href="/" class="flex items-center gap-2 text-stone-900">
        <svg class="h-5 w-5 text-stone-500" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
        </svg>
        <span class="font-semibold tracking-tight">PDF Extractor</span>
      </a>
      <span class="text-stone-300">|</span>
      <span class="text-sm text-stone-400">Автоматическая нарезка журналов</span>
      <a href="/history"
         class="ml-auto text-sm text-stone-400 hover:text-stone-700 transition-colors">
        История
      </a>
    </div>
  </header>

  <!-- Main content -->
  <main class="max-w-2xl mx-auto px-6 py-10">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="max-w-2xl mx-auto px-6 pb-8 text-xs text-stone-300 text-center">
    PDF Extractor — детерминированный pipeline · Phase 3
  </footer>

</body>
</html>
